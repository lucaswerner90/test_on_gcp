name: Vertex AI ML Pipeline Trigger

on:
  push:
    branches:
      - main
  # Also allow manual triggering from the Actions tab
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    # Required for workload identity federation
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          # You need to configure Workload Identity Federation in GCP
          workload_identity_provider: 'projects/426929788583/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'pipeline-runner@practice-ml-project-402717.iam.gserviceaccount.com'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Requirements
        run: |
          python -m pip install --upgrade pip
          # Assuming you might have a requirements.txt, otherwise install directly:
          pip install kfp google-cloud-aiplatform google-cloud-pipeline-components tensorflow pytest keras jax

      - name: Run Pytest QA Suite
        run: |
          PYTHONPATH=. pytest tests/

      - name: Trigger Kubeflow Pipeline Compilation Check
        run: |
          # This compiles the pipeline to check DAG integrity on every push without deploying it
          python src/pipeline.py --compile-only

      - name: Submit Vertex AI Pipeline (Manual Trigger Only)
        if: github.event_name == 'workflow_dispatch'
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION: ${{ secrets.GCP_REGION }}
          GCP_BUCKET_URL: ${{ secrets.GCP_BUCKET_URL }}
        run: |
          # This actually submits the ML pipeline to Vertex AI! 
          # It only runs when you manually click "Run workflow" in the GitHub Actions UI.
          python src/pipeline.py
